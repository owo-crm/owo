<svg width="980" height="520" viewBox="0 0 980 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="980" height="520" rx="24" fill="#ffffff"/>
  
  <!-- Header Section -->
  <text x="32" y="44" fill="#0F172A" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="800">Grafik tygodniowy</text>
  <text x="32" y="66" fill="#64748B" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="500">20 – 26 maja 2034</text>
  
  <text x="742" y="38" fill="#64748B" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600">Dołącz grafik</text>
  <rect x="852" y="18" width="28" height="28" rx="14" fill="#ffffff" stroke="#DCE6F2"/>
  <text x="866" y="37" fill="#64748B" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" text-anchor="middle">&lt;</text>
  
  <rect x="888" y="18" width="28" height="28" rx="14" fill="#ffffff" stroke="#DCE6F2"/>
