    <text x="265" y="104">WT</text><text x="265" y="120" fill="#0F172A" font-size="14" font-weight="800">21</text>
    <text x="395" y="104">ŚR</text><text x="395" y="120" fill="#0F172A" font-size="14" font-weight="800">22</text>
    <text x="525" y="104">CZW</text><text x="525" y="120" fill="#0F172A" font-size="14" font-weight="800">23</text>
    <text x="655" y="104">PT</text><text x="655" y="120" fill="#0F172A" font-size="14" font-weight="800">24</text>
    <text x="785" y="104">SOB</text><text x="785" y="120" fill="#0F172A" font-size="14" font-weight="800">25</text>
    <text x="915" y="104">ND</text><text x="915" y="120" fill="#0F172A" font-size="14" font-weight="800">26</text>
