    <rect x="728" y="189" width="114" height="132" rx="12" fill="#EEE5FF" stroke="#C8B5FF"/>
    <text x="785" y="207" fill="#7C3AED">Kasia</text>
    
    <!-- ND: Karolina -->
    <rect x="858" y="245" width="114" height="104" rx="12" fill="#EEE5FF" stroke="#C8B5FF"/>
    <text x="915" y="263" fill="#7C3AED">Karolina</text>
