    <text x="35" y="176">11:00</text>
    <text x="35" y="204">12:00</text>
    <text x="35" y="232">13:00</text>
    <text x="35" y="260">14:00</text>
    <text x="35" y="288">15:00</text>
    <text x="35" y="316">16:00</text>
    <text x="35" y="344">17:00</text>
    <text x="35" y="372">18:00</text>
