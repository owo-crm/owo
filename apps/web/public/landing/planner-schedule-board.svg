    <line x1="70" y1="157" x2="980" y2="157"/>
    <line x1="70" y1="185" x2="980" y2="185"/>
    <line x1="70" y1="213" x2="980" y2="213"/>
    <line x1="70" y1="241" x2="980" y2="241"/>
    <line x1="70" y1="269" x2="980" y2="269"/>
    <line x1="70" y1="297" x2="980" y2="297"/>
    <line x1="70" y1="325" x2="980" y2="325"/>
    <line x1="70" y1="353" x2="980" y2="353"/>
    <line x1="70" y1="381" x2="980" y2="381"/>
    
