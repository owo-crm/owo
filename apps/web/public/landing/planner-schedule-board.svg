  <!-- Day Headers (Perfectly Centered Columns: Width 130, start at 70) -->
  <g fill="#64748B" font-family="'Manrope', 'Segoe UI', system-ui, sans-serif" font-size="10" font-weight="700" text-anchor="middle">
