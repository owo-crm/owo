    <rect x="338" y="189" width="54" height="132" rx="12" fill="#DBEAFE" stroke="#9BBFFC"/>
    <text x="365" y="207" fill="#1D4ED8">Igor</text>
    
    <!-- Lane 1 (Julia) -->
    <rect x="398" y="273" width="54" height="104" rx="12" fill="#FEF3C7" stroke="#FDC86B"/>
    <text x="425" y="291" fill="#B45309">Julia</text>
    
