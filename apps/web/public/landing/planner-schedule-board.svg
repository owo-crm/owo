    <text x="235" y="207" fill="#1D4ED8">Sara</text>
    
    <!-- Lane 1 (Lena) -->
    <rect x="268" y="189" width="54" height="132" rx="12" fill="#DBEAFE" stroke="#9BBFFC"/>
    <text x="295" y="207" fill="#1D4ED8">Lena</text>
    
    <!-- Lane 0 Bottom (Michał) -->
    <rect x="208" y="273" width="54" height="104" rx="12" fill="#FEF3C7" stroke="#FDC86B"/>
    <text x="235" y="291" fill="#B45309">Michał</text>
    
