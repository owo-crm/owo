    <rect x="468" y="133" width="36" height="188" rx="10" fill="#DBF5E7" stroke="#7AD7AB"/>
    <text x="486" y="151" fill="#166534" font-size="8">Marta</text>
    
    <rect x="509" y="133" width="36" height="188" rx="10" fill="#DBF5E7" stroke="#7AD7AB"/>
    <text x="527" y="151" fill="#166534" font-size="8">Dawid</text>
    
    <rect x="550" y="133" width="36" height="188" rx="10" fill="#DBF5E7" stroke="#7AD7AB"/>
    <text x="568" y="151" fill="#166534" font-size="8">Anna</text>
    
