version: "3.9"

services:
  db:
    image: postgres:16
    container_name: workdish_db
    environment:
      POSTGRES_USER: workdish
      POSTGRES_PASSWORD: workdish
      POSTGRES_DB: workdish
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: workdish_api
    environment:
      DATABASE_URL: postgresql+psycopg://workdish:workdish@db:5432/workdish
      SECRET_KEY: change-me-in-dev
      ACCESS_TOKEN_EXPIRE_MINUTES: "720"
      CORS_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      APP_ENV: development
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    depends_on:
      - db
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./apps/api:/app

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: workdish_web
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  pgdata:
